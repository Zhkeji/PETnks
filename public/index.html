<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <title>三角洲护航 - 专业游戏代练服务平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── 首页特有样式 ──────────────────────────── */
    .banner-wrap { padding: 12px 16px; }
    .banner-carousel { position: relative; height: 170px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .banner-carousel img { width: 100%; height: 100%; object-fit: cover; display: none; transition: opacity 0.5s; }
    .banner-carousel img.active { display: block; }
    .banner-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 16px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); color: white; }
    .banner-overlay .title { font-size: 16px; font-weight: 700; }
    .banner-dots { position: absolute; bottom: 10px; right: 12px; display: flex; gap: 5px; }
    .banner-dots .dot { width: 6px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.4); transition: var(--transition); }
    .banner-dots .dot.active { background: white; width: 18px; }
    /* 公告 */
    .notice-bar { margin: 0 16px 12px; background: var(--primary-light); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--primary-dark); overflow: hidden; }
    .notice-bar .tag { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .notice-bar .text { flex: 1; overflow: hidden; white-space: nowrap; }
    .notice-bar .text span { display: inline-block; animation: marquee 10s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    /* 分类 */
    .section { padding: 0 16px 16px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .section-title { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
    .section-more { font-size: 13px; color: var(--text-muted); cursor: pointer; }
    .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .cat-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: var(--transition); }
    .cat-item:active { transform: scale(0.93); }
    .cat-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: var(--shadow-sm); transition: var(--transition); }
    .cat-item:hover .cat-icon { box-shadow: var(--shadow); transform: translateY(-2px); }
    .cat-name { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .cat-count { font-size: 10px; color: var(--text-muted); }
    /* 商品卡片 */
    .product-grid { display: flex; flex-direction: column; gap: 12px; }
    .product-card { background: var(--card); border-radius: var(--radius); padding: 14px; display: flex; gap: 14px; box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
    .product-card:active { transform: scale(0.98); }
    .product-card:hover { box-shadow: var(--shadow); }
    .product-cover { width: 88px; height: 88px; border-radius: var(--radius-sm); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; position: relative; overflow: hidden; }
    .product-cover::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15)); }
    .product-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
    .product-title { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 3px; }
    .product-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .product-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .product-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .product-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .product-badge { position: absolute; top: 0; right: 0; padding: 3px 10px; font-size: 10px; font-weight: 700; border-radius: 0 0 0 8px; }
    .product-badge.hot { background: var(--danger); color: white; }
    .product-badge.new { background: var(--info); color: white; }
    /* 商品详情 */
    .detail-hero { height: 220px; display: flex; align-items: center; justify-content: center; font-size: 72px; position: relative; }
    .detail-hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, var(--card)); }
    .detail-body { padding: 0 20px 100px; position: relative; margin-top: -20px; }
    .detail-cat { font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
    .detail-title { font-size: 22px; font-weight: 800; line-height: 1.3; margin-bottom: 4px; }
    .detail-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
    .detail-price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; padding: 16px; background: var(--primary-light); border-radius: var(--radius-sm); }
    .detail-price { font-size: 30px; font-weight: 800; color: var(--primary); }
    .detail-original { font-size: 15px; color: var(--text-muted); text-decoration: line-through; }
    .detail-unit { font-size: 14px; color: var(--text-secondary); }
    .detail-section { margin-bottom: 20px; }
    .detail-section h4 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
    .qty-row { display: flex; align-items: center; gap: 16px; }
    .qty-btn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
    .qty-val { font-size: 20px; font-weight: 700; min-width: 36px; text-align: center; }
    .detail-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 12px 16px; display: flex; align-items: center; gap: 16px; border-top: 1px solid var(--border); z-index: 100; padding-bottom: calc(12px + env(safe-area-inset-bottom)); backdrop-filter: blur(20px); background: rgba(255,255,255,0.95); }
    .detail-total { flex: 1; }
    .detail-total .label { font-size: 12px; color: var(--text-muted); }
    .detail-total .amount { font-size: 24px; font-weight: 800; color: var(--primary); }
    /* 订单列表 */
    .order-tabs { display: flex; background: var(--card); position: sticky; top: 44px; z-index: 40; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
    .order-tabs::-webkit-scrollbar { display: none; }
    .order-tab { flex: 1; min-width: 60px; text-align: center; padding: 12px 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; position: relative; transition: var(--transition); white-space: nowrap; }
    .order-tab.active { color: var(--primary); }
    .order-tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 2.5px; background: var(--primary); border-radius: 2px; }
    .order-list { padding: 12px 16px; }
    .order-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow-sm); transition: var(--transition); }
    .order-card:active { transform: scale(0.99); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .order-no { font-size: 12px; color: var(--text-muted); font-family: 'SF Mono', 'Menlo', monospace; }
    .order-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
    .order-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .order-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
    .order-footer { display: flex; justify-content: space-between; align-items: center; }
    .order-actions { display: flex; gap: 8px; }
    /* 个人中心 */
    .profile-hero { background: var(--primary-gradient); color: white; padding: 32px 20px 44px; text-align: center; position: relative; overflow: hidden; }
    .profile-hero::before { content: ''; position: absolute; top: -50%; right: -30%; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.08); }
    .profile-hero::after { content: ''; position: absolute; bottom: -40%; left: -20%; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 3px solid rgba(255,255,255,0.3); position: relative; z-index: 1; }
    .profile-name { font-size: 18px; font-weight: 700; position: relative; z-index: 1; }
    .profile-phone { font-size: 13px; opacity: 0.8; margin-top: 4px; position: relative; z-index: 1; }
    .balance-card { margin: -24px 16px 16px; background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-lg); display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; position: relative; z-index: 2; }
    .balance-item .value { font-size: 22px; font-weight: 800; color: var(--primary); }
    .balance-item .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .menu-group { background: var(--card); border-radius: var(--radius); overflow: hidden; margin: 0 16px 12px; box-shadow: var(--shadow-sm); }
    .menu-item { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid var(--border-light); }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: var(--bg); }
    .menu-item .icon { font-size: 20px; margin-right: 14px; width: 24px; text-align: center; }
    .menu-item .text { flex: 1; font-size: 14px; font-weight: 500; }
    .menu-item .arrow { color: var(--text-muted); font-size: 16px; }
    .menu-item .extra { font-size: 13px; color: var(--text-muted); margin-right: 8px; }
    /* 搜索 */
    .search-bar { margin: 12px 16px; position: relative; }
    .search-bar input { width: 100%; padding: 10px 14px 10px 38px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; outline: none; background: var(--card); transition: var(--transition); }
    .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
    .search-bar .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }
    /* 排序 */
    .sort-bar { display: flex; gap: 0; padding: 0 16px; margin-bottom: 12px; background: var(--card); border-radius: var(--radius-sm); overflow: hidden; }
    .sort-item { flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: var(--transition); }
    .sort-item.active { color: var(--primary); font-weight: 700; background: var(--primary-light); }
    /* 充值 */
    .recharge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .recharge-item { text-align: center; padding: 14px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); }
    .recharge-item:hover, .recharge-item.selected { border-color: var(--primary); background: var(--primary-light); }
    .recharge-item .amount { font-size: 20px; font-weight: 800; color: var(--text); }
    .recharge-item .bonus { font-size: 11px; color: var(--primary); font-weight: 600; margin-top: 4px; }
    /* 登录页 */
    .login-page { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 32px; background: var(--primary-gradient); }
    .login-logo { text-align: center; color: white; margin-bottom: 40px; }
    .login-logo .icon { font-size: 64px; margin-bottom: 12px; }
    .login-logo h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    .login-logo p { font-size: 14px; opacity: 0.8; margin-top: 6px; }
    .login-box { background: var(--card); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-xl); }
    .login-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    /* 相关商品 */
    .related-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .related-scroll::-webkit-scrollbar { display: none; }
    .related-card { min-width: 140px; background: var(--card); border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); cursor: pointer; flex-shrink: 0; }
    .related-card .cover { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .related-card .info { padding: 8px 10px; }
    .related-card .title { font-size: 12px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .related-card .price { font-size: 14px; font-weight: 800; color: var(--primary); }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <!-- ═══ 登录页 ═══ -->
  <div class="page active" id="pageLogin">
    <div class="login-page">
      <div class="login-logo">
        <div class="icon">🎯</div>
        <h1>三角洲护航</h1>
        <p>专业游戏代练服务平台</p>
      </div>
      <div class="login-box">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input class="form-input" id="loginPhone" type="tel" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div style="display:flex;gap:10px;">
            <input class="form-input" id="loginCode" type="text" placeholder="输入验证码" maxlength="6" inputmode="numeric" style="flex:1;">
            <button class="btn btn-outline" onclick="sendCode()" id="codeBtn" style="white-space:nowrap;">发送验证码</button>
          </div>
          <p class="login-hint">测试环境：任意手机号，验证码输入 123456</p>
        </div>
        <button class="btn btn-primary btn-lg btn-block" onclick="doLogin()">登 录</button>
      </div>
    </div>
  </div>

  <!-- ═══ 首页 ═══ -->
  <div class="page" id="pageHome">
    <div class="topbar">
      <div><h1>三角洲护航</h1></div>
      <div class="sub" id="homeUserInfo"></div>
    </div>
    <div class="banner-wrap">
      <div class="banner-carousel" id="bannerCarousel">
        <div class="skeleton-banner skeleton"></div>
      </div>
    </div>
    <div class="notice-bar" id="noticeBar" style="display:none;">
      <span class="tag">公告</span>
      <div class="text"><span id="noticeText"></span></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">🏷️ 服务分类</span>
        <span class="section-more" onclick="switchTab('category')">全部 ›</span>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-title">🔥 热门推荐</span>
      </div>
      <div class="product-grid" id="hotProducts">
        <div class="skeleton-card skeleton"></div>
        <div class="skeleton-card skeleton"></div>
        <div class="skeleton-card skeleton"></div>
      </div>
    </div>
  </div>

  <!-- ═══ 分类页 ═══ -->
  <div class="page" id="pageCategory">
    <div class="topbar"><h1>全部服务</h1></div>
    <div class="search-bar">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索服务..." oninput="debounceSearch()">
    </div>
    <div style="padding:0 16px;">
      <div class="category-grid" id="allCategories" style="margin-bottom:16px;"></div>
      <div class="sort-bar" id="sortBar">
        <div class="sort-item active" data-sort="sort_order">默认</div>
        <div class="sort-item" data-sort="sales">销量</div>
        <div class="sort-item" data-sort="price_asc">价格↑</div>
        <div class="sort-item" data-sort="price_desc">价格↓</div>
        <div class="sort-item" data-sort="new">最新</div>
      </div>
      <div class="product-grid" id="categoryProducts"></div>
    </div>
  </div>

  <!-- ═══ 订单页 ═══ -->
  <div class="page" id="pageOrders">
    <div class="topbar"><h1>我的订单</h1></div>
    <div class="order-tabs" id="orderTabs">
      <div class="order-tab active" data-status="">全部</div>
      <div class="order-tab" data-status="PENDING">待支付</div>
      <div class="order-tab" data-status="PAID">待接单</div>
      <div class="order-tab" data-status="ASSIGNED">进行中</div>
      <div class="order-tab" data-status="COMPLETED">已完成</div>
    </div>
    <div class="order-list" id="orderList"></div>
  </div>

  <!-- ═══ 我的页 ═══ -->
  <div class="page" id="pageProfile">
    <div class="profile-hero">
      <div class="profile-avatar" id="profileAvatar">👤</div>
      <div class="profile-name" id="profileName">未登录</div>
      <div class="profile-phone" id="profilePhone"></div>
    </div>
    <div class="balance-card">
      <div class="balance-item"><div class="value" id="balanceValue">¥0.00</div><div class="label">账户余额</div></div>
      <div class="balance-item"><div class="value" id="orderCount">0</div><div class="label">历史订单</div></div>
      <div class="balance-item"><div class="value" id="totalSpent">¥0</div><div class="label">累计消费</div></div>
    </div>
    <div style="height:12px;"></div>
    <div class="menu-group">
      <div class="menu-item" onclick="showRechargeModal()"><span class="icon">💰</span><span class="text">充值中心</span><span class="extra">充100送5</span><span class="arrow">›</span></div>
      <div class="menu-item" onclick="showApplyPlayerModal()"><span class="icon">🎮</span><span class="text">成为接单员</span><span class="arrow">›</span></div>
      <div class="menu-item" onclick="switchTab('orders')"><span class="icon">📋</span><span class="text">我的订单</span><span class="arrow">›</span></div>
    </div>
    <div class="menu-group">
      <div class="menu-item"><span class="icon">💬</span><span class="text">联系客服</span><span class="arrow">›</span></div>
      <div class="menu-item"><span class="icon">📖</span><span class="text">使用帮助</span><span class="arrow">›</span></div>
      <div class="menu-item"><span class="icon">⚙️</span><span class="text">设置</span><span class="arrow">›</span></div>
    </div>
    <div class="menu-group">
      <div class="menu-item" onclick="logout()" style="justify-content:center;"><span class="text" style="color:var(--danger);">退出登录</span></div>
    </div>
  </div>

  <!-- ═══ 弹窗：商品详情 ═══ -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-sheet" id="productDetail" style="position:relative;"></div>
  </div>

  <!-- ═══ 弹窗：充值 ═══ -->
  <div class="modal-overlay" id="rechargeModal">
    <div class="modal-sheet">
      <div class="modal-title">💰 充值中心</div>
      <p class="text-sm text-muted text-center mb-16">充越多送越多，余额永不过期</p>
      <div class="recharge-grid" id="rechargeOptions"></div>
      <div class="form-group">
        <input class="form-input" id="rechargeAmount" type="number" placeholder="自定义金额" inputmode="decimal">
      </div>
      <button class="btn btn-primary btn-lg btn-block" onclick="doRecharge()">确认充值</button>
      <button class="btn btn-ghost btn-block" onclick="closeModal('rechargeModal')" style="margin-top:8px;">取消</button>
    </div>
  </div>

  <!-- ═══ 弹窗：申请接单员 ═══ -->
  <div class="modal-overlay" id="applyPlayerModal">
    <div class="modal-sheet">
      <div class="modal-title">🎮 申请成为接单员</div>
      <div class="form-group"><label class="form-label">真实姓名 *</label><input class="form-input" id="applyName" placeholder="请输入真实姓名"></div>
      <div class="form-group"><label class="form-label">擅长游戏</label><input class="form-input" id="applyGames" placeholder="如：三角洲行动、无畏契约"></div>
      <div class="form-group"><label class="form-label">游戏段位</label><input class="form-input" id="applyRank" placeholder="如：王者、永恒钻石"></div>
      <div class="form-group"><label class="form-label">技能描述</label><textarea class="form-input" id="applySkill" placeholder="描述你的游戏水平和特长"></textarea></div>
      <button class="btn btn-primary btn-lg btn-block" onclick="doApplyPlayer()">提交申请</button>
      <button class="btn btn-ghost btn-block" onclick="closeModal('applyPlayerModal')" style="margin-top:8px;">取消</button>
    </div>
  </div>

  <!-- ═══ 底部导航 ═══ -->
  <div class="tab-bar" id="tabBar" style="display:none;">
    <div class="tab-item active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      首页
    </div>
    <div class="tab-item" data-tab="category" onclick="switchTab('category')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      分类
    </div>
    <div class="tab-item" data-tab="orders" onclick="switchTab('orders')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      订单
    </div>
    <div class="tab-item" data-tab="profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      我的
    </div>
  </div>

<script>
const API = '/api';
let token = localStorage.getItem('delta_token');
let currentUser = null;
let currentOrderStatus = '';
let selectedQty = 1;
let selectedProduct = null;
let categories = [];
let currentSort = 'sort_order';
let currentCatId = null;
let searchTimer = null;
let ws = null;

// ── 工具 ─────────────────────────────────────────
function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  try {
    const res = await fetch(API + path, { ...options, headers });
    if (res.status === 401) { logout(); return { code: 401, msg: '请重新登录' }; }
    return await res.json();
  } catch (e) {
    showToast('网络错误，请重试');
    return { code: -1, msg: '网络错误' };
  }
}

function formatPrice(p) { return '¥' + Number(p).toFixed(2); }
function formatDate(d) { if (!d) return ''; const dt = new Date(d); const now = new Date(); const diff = now - dt; if (diff < 60000) return '刚刚'; if (diff < 3600000) return Math.floor(diff/60000) + '分钟前'; if (diff < 86400000) return Math.floor(diff/3600000) + '小时前'; return dt.toLocaleDateString('zh-CN'); }
function statusText(s) { return { PENDING:'待支付', PAID:'待接单', ASSIGNED:'已接单', IN_PROGRESS:'进行中', COMPLETED:'已完成', REVIEWING:'评价中', REFUNDING:'退款中', REFUNDED:'已退款', CANCELLED:'已取消', DISPUTE:'争议中' }[s] || s; }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function debounce(fn, ms = 300) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

// ── WebSocket ────────────────────────────────────
function connectWS() {
  if (!token || ws) return;
  try {
    ws = new WebSocket(`ws://${location.host}/ws?token=${token}`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'new_order') showToast(`🆕 新订单: ${msg.title} ¥${msg.amount}`);
      if (msg.type === 'order_assigned') showToast(`✅ ${msg.player_name} 已接单`);
      if (msg.type === 'order_progress') showToast(`📋 进度更新: ${msg.progress}`);
      if (msg.type === 'order_completed') showToast(`🎉 订单 ${msg.order_no} 已完成`);
      if (msg.type === 'order_refunded') showToast(`💰 退款已到账`);
    };
    ws.onclose = () => { ws = null; setTimeout(connectWS, 5000); };
    ws.onerror = () => { ws = null; };
  } catch (e) { /* ignore */ }
}

// ── 登录 ─────────────────────────────────────────
function sendCode() {
  const phone = document.getElementById('loginPhone').value;
  if (!phone || phone.length < 11) return showToast('请输入正确的手机号');
  showToast('验证码已发送（测试: 123456）');
  let sec = 60;
  const btn = document.getElementById('codeBtn');
  btn.disabled = true;
  const timer = setInterval(() => { btn.textContent = `${--sec}s`; if (sec <= 0) { clearInterval(timer); btn.textContent = '发送验证码'; btn.disabled = false; } }, 1000);
}

async function doLogin() {
  const phone = document.getElementById('loginPhone').value;
  const code = document.getElementById('loginCode').value;
  if (!phone) return showToast('请输入手机号');
  if (!code) return showToast('请输入验证码');
  const res = await api('/user/login', { method: 'POST', body: JSON.stringify({ phone, code }) });
  if (res.code === 0) {
    token = res.data.token;
    currentUser = res.data.user;
    localStorage.setItem('delta_token', token);
    showToast('登录成功');
    enterApp();
  } else { showToast(res.msg); }
}

function logout() {
  token = null; currentUser = null; ws?.close(); ws = null;
  localStorage.removeItem('delta_token');
  document.getElementById('tabBar').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pageLogin').classList.add('active');
}

// ── 进入主界面 ───────────────────────────────────
async function enterApp() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tabBar').style.display = 'flex';
  switchTab('home');
  await Promise.all([loadBanners(), loadAnnouncements(), loadCategories(), loadHotProducts()]);
  loadProfile();
  connectWS();
}

// ── Tab 切换 ─────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  const map = { home:'pageHome', category:'pageCategory', orders:'pageOrders', profile:'pageProfile' };
  document.getElementById(map[tab]).classList.add('active');
  document.querySelector(`.tab-item[data-tab="${tab}"]`)?.classList.add('active');
  if (tab === 'orders') loadOrders();
  if (tab === 'profile') loadProfile();
  if (tab === 'category') { loadAllCategories(); loadCategoryProducts(); }
}

// ── 轮播图 ───────────────────────────────────────
async function loadBanners() {
  const res = await api('/banners');
  if (res.code !== 0 || !res.data.length) return;
  const carousel = document.getElementById('bannerCarousel');
  carousel.innerHTML = res.data.map((b, i) => `<img src="${b.image_url}" alt="${b.title}" class="${i===0?'active':''}">`).join('') +
    `<div class="banner-dots">${res.data.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>`;
  let idx = 0;
  setInterval(() => {
    const imgs = carousel.querySelectorAll('img'); const dots = carousel.querySelectorAll('.dot');
    if (!imgs.length) return;
    imgs[idx].classList.remove('active'); dots[idx].classList.remove('active');
    idx = (idx + 1) % imgs.length;
    imgs[idx].classList.add('active'); dots[idx].classList.add('active');
  }, 4000);
}

async function loadAnnouncements() {
  const res = await api('/announcements');
  if (res.code === 0 && res.data.length) {
    document.getElementById('noticeBar').style.display = 'flex';
    document.getElementById('noticeText').textContent = res.data[0].title + ' — ' + res.data[0].content;
  }
}

// ── 分类 ─────────────────────────────────────────
async function loadCategories() {
  const res = await api('/categories');
  if (res.code !== 0) return;
  categories = res.data;
  const grid = document.getElementById('categoryGrid');
  const mainCats = categories.filter(c => c.parent_id === 0);
  const colors = ['#FF6B35','#4F46E5','#DC2626','#059669','#8B5CF6','#EC4899','#F59E0B','#06B6D4'];
  grid.innerHTML = mainCats.map((c, i) => `
    <div class="cat-item" onclick="filterByCategory(${c.id})">
      <div class="cat-icon" style="background:${c.color || colors[i]}15;color:${c.color || colors[i]}">${c.icon || '🎮'}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-count">${c.product_count || 0}个服务</div>
    </div>
  `).join('');
}

async function loadAllCategories() {
  const grid = document.getElementById('allCategories');
  const colors = ['#FF6B35','#4F46E5','#DC2626','#059669','#8B5CF6','#EC4899','#F59E0B','#06B6D4'];
  grid.innerHTML = categories.filter(c => c.parent_id === 0).map((c, i) => `
    <div class="cat-item" onclick="filterByCategory(${c.id})" style="opacity:${!currentCatId || currentCatId === c.id ? 1 : 0.5}">
      <div class="cat-icon" style="background:${c.color || colors[i]}15;color:${c.color || colors[i]}">${c.icon || '🎮'}</div>
      <div class="cat-name">${c.name}</div>
    </div>
  `).join('');
}

function filterByCategory(catId) {
  currentCatId = currentCatId === catId ? null : catId;
  switchTab('category');
  loadCategoryProducts();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadCategoryProducts(), 300);
}

async function loadCategoryProducts() {
  const keyword = document.getElementById('searchInput')?.value || '';
  let url = `/products?sort=${currentSort}&limit=50`;
  if (currentCatId) url += `&category_id=${currentCatId}`;
  if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
  const res = await api(url);
  const grid = document.getElementById('categoryProducts');
  if (res.code !== 0 || !res.data.length) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">📦</div><div class="title">暂无服务</div><div class="desc">换个分类看看</div></div>';
    return;
  }
  grid.innerHTML = res.data.map(p => renderProductCard(p)).join('');
}

// ── 热门商品 ─────────────────────────────────────
async function loadHotProducts() {
  const res = await api('/products?hot=1');
  const grid = document.getElementById('hotProducts');
  if (res.code !== 0 || !res.data.length) { grid.innerHTML = '<div class="empty-state"><div class="emoji">🔥</div><div class="title">暂无热门</div></div>'; return; }
  grid.innerHTML = res.data.map(p => renderProductCard(p)).join('');
}

const coverGradients = ['#667eea → #764ba2','#f093fb → #f5576c','#4facfe → #00f2fe','#43e97b → #38f9d7','#fa709a → #fee140','#a18cd1 → #fbc2eb','#fccb90 → #d57eeb','#e0c3fc → #8ec5fc'];
function renderProductCard(p) {
  const icons = ['🎯','⚔️','💰','📋','🎮','🔫','👑','🪖','⭐','🏆'];
  const icon = icons[p.category_id % icons.length];
  const grad = coverGradients[p.id % coverGradients.length];
  return `
    <div class="product-card" onclick="showProductDetail(${p.id})">
      <div class="product-cover" style="background:linear-gradient(135deg,${grad})">${icon}</div>
      <div class="product-info">
        <div>
          <div class="product-title">${p.title}</div>
          ${p.subtitle ? `<div class="product-subtitle">${p.subtitle}</div>` : ''}
          <div class="product-tags">
            ${p.hot ? '<span class="product-tag" style="background:var(--danger-light);color:var(--danger);">HOT</span>' : ''}
            ${p.new ? '<span class="product-tag" style="background:var(--info-light);color:var(--info);">NEW</span>' : ''}
            ${p.sales > 0 ? `<span class="product-tag">已售${p.sales}</span>` : ''}
          </div>
        </div>
        <div class="product-bottom">
          <div class="price"><span class="symbol">¥</span>${p.price}<span class="unit">/${p.unit}</span>${p.original_price > p.price ? `<span class="original">¥${p.original_price}</span>` : ''}</div>
        </div>
      </div>
    </div>`;
}

// ── 商品详情 ─────────────────────────────────────
async function showProductDetail(id) {
  const res = await api(`/products/${id}`);
  if (res.code !== 0) return;
  selectedProduct = res.data;
  selectedQty = 1;
  const p = res.data;
  const icons = ['🎯','⚔️','💰','📋','🎮','🔫','👑','🪖','⭐','🏆'];
  const icon = icons[p.category_id % icons.length];
  const grad = coverGradients[p.id % coverGradients.length];

  document.getElementById('productDetail').innerHTML = `
    <button class="modal-close" onclick="closeModal('productModal')">✕</button>
    <div class="detail-hero" style="background:linear-gradient(135deg,${grad})">${icon}</div>
    <div class="detail-body">
      <div class="detail-cat">${p.category_name}</div>
      <div class="detail-title">${p.title}</div>
      <div class="detail-subtitle">${p.subtitle || p.desc}</div>
      <div class="detail-price-row">
        <div class="detail-price"><span class="symbol">¥</span>${p.price}</div>
        ${p.original_price > p.price ? `<div class="detail-original">¥${p.original_price}</div>` : ''}
        <div class="detail-unit">/${p.unit}</div>
      </div>
      <div class="detail-section">
        <h4>数量</h4>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-val" id="qtyValue">1</div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="detail-section">
        <h4>游戏信息</h4>
        <div class="form-group"><textarea class="form-input" id="orderGameInfo" placeholder="请输入游戏ID、大区、段位等信息"></textarea></div>
      </div>
      <div class="detail-section">
        <h4>备注</h4>
        <div class="form-group"><input class="form-input" id="orderRemark" placeholder="其他要求（选填）"></div>
      </div>
      ${p.related?.length ? `
      <div class="detail-section">
        <h4>相关推荐</h4>
        <div class="related-scroll">
          ${p.related.map(r => {
            const g = coverGradients[r.id % coverGradients.length];
            return `<div class="related-card" onclick="closeModal('productModal');setTimeout(()=>showProductDetail(${r.id}),300)">
              <div class="cover" style="background:linear-gradient(135deg,${g})">${icons[r.id % icons.length]}</div>
              <div class="info"><div class="title">${r.title}</div><div class="price">¥${r.price}/${r.unit}</div></div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}
    </div>
    <div class="detail-bottom">
      <div class="detail-total">
        <div class="label">合计</div>
        <div class="amount" id="detailTotal">${formatPrice(p.price)}</div>
      </div>
      <button class="btn btn-primary btn-lg" onclick="createOrder()">立即下单</button>
    </div>
  `;
  document.getElementById('productModal').classList.add('active');
}

function changeQty(d) {
  selectedQty = Math.max(1, Math.min(99, selectedQty + d));
  document.getElementById('qtyValue').textContent = selectedQty;
  document.getElementById('detailTotal').textContent = formatPrice(selectedProduct.price * selectedQty);
}

// ── 下单 ─────────────────────────────────────────
async function createOrder() {
  if (!selectedProduct) return;
  const game_info = document.getElementById('orderGameInfo')?.value || '';
  const remark = document.getElementById('orderRemark')?.value || '';
  const res = await api('/orders', { method: 'POST', body: JSON.stringify({ product_id: selectedProduct.id, quantity: selectedQty, game_info, remark, assign_mode: 'GRAB' }) });
  if (res.code === 0) {
    showToast('下单成功！');
    closeModal('productModal');
    setTimeout(() => { if (confirm(`订单已创建，是否立即支付 ${formatPrice(res.data.total_amount)}？`)) payOrder(res.data.id); }, 500);
  } else { showToast(res.msg); }
}

async function payOrder(orderId) {
  const res = await api(`/orders/${orderId}/pay`, { method: 'POST', body: JSON.stringify({ pay_method: 'BALANCE' }) });
  if (res.code === 0) { showToast('支付成功！'); loadOrders(); loadProfile(); }
  else showToast(res.msg);
}

// ── 订单 ─────────────────────────────────────────
async function loadOrders() {
  const res = await api(`/user/orders?status=${currentOrderStatus}&limit=50`);
  const list = document.getElementById('orderList');
  if (res.code !== 0 || !res.data.length) { list.innerHTML = '<div class="empty-state"><div class="emoji">📋</div><div class="title">暂无订单</div><div class="desc">去下单吧</div></div>'; return; }
  list.innerHTML = res.data.map(o => `
    <div class="order-card" onclick="showOrderDetail(${o.id})">
      <div class="order-header">
        <span class="order-no">${o.order_no}</span>
        <span class="order-status s-${o.order_status}">${statusText(o.order_status)}</span>
      </div>
      <div class="order-title">${o.product_title}</div>
      <div class="order-meta">数量: ${o.quantity} · ${formatDate(o.created_at)}</div>
      <div class="order-footer">
        <div class="price" style="font-size:18px;"><span class="symbol">¥</span>${o.total_amount}</div>
        <div class="order-actions" onclick="event.stopPropagation()">
          ${o.order_status === 'PENDING' ? `<button class="btn btn-primary btn-sm" onclick="payOrder(${o.id})">支付</button><button class="btn btn-outline btn-sm" onclick="cancelOrder(${o.id})">取消</button>` : ''}
          ${o.order_status === 'COMPLETED' ? `<button class="btn btn-primary btn-sm" onclick="reviewOrder(${o.id})">评价</button>` : ''}
          ${['PAID','ASSIGNED'].includes(o.order_status) ? `<button class="btn btn-danger btn-sm" onclick="refundOrder(${o.id})">退款</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

async function showOrderDetail(id) {
  const res = await api(`/user/orders/${id}`);
  if (res.code !== 0) return;
  const o = res.data;
  const timelineHtml = o.timeline?.map(t => `
    <div class="timeline-item">
      <div class="timeline-dot"></div>
      <div class="timeline-time">${formatDate(t.created_at)}</div>
      <div class="timeline-content">${t.content}</div>
    </div>
  `).join('') || '';

  const detail = document.getElementById('productDetail');
  detail.innerHTML = `
    <button class="modal-close" onclick="closeModal('productModal')">✕</button>
    <div style="padding:24px;">
      <div class="flex justify-between items-center mb-16">
        <span class="order-no" style="font-size:14px;">${o.order_no}</span>
        <span class="order-status s-${o.order_status}" style="font-size:13px;padding:4px 14px;">${statusText(o.order_status)}</span>
      </div>
      <h3 style="font-size:18px;font-weight:800;margin-bottom:4px;">${o.product_title}</h3>
      <p class="text-sm text-muted mb-16">${o.product_subtitle || ''}</p>
      <div class="flex justify-between mb-16" style="padding:14px;background:var(--border-light);border-radius:var(--radius-sm);">
        <span class="text-sm">数量: ${o.quantity}</span>
        <span class="price" style="font-size:18px;"><span class="symbol">¥</span>${o.total_amount}</span>
      </div>
      ${o.player ? `
      <div class="card mb-16"><div class="card-body flex gap-12 items-center">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;">🎮</div>
        <div><div class="font-bold">${o.player.real_name || o.player.nickname}</div><div class="text-xs text-muted">⭐ ${o.player.rating} · 完成 ${o.player.total_orders} 单</div></div>
      </div></div>` : ''}
      ${o.game_info ? `<div class="mb-12"><span class="text-xs text-muted">游戏信息：</span><span class="text-sm">${o.game_info}</span></div>` : ''}
      ${o.progress ? `<div class="mb-12" style="padding:12px;background:var(--success-light);border-radius:var(--radius-sm);"><span class="text-xs" style="color:#065F46;font-weight:600;">最新进度：</span><span class="text-sm">${o.progress}</span></div>` : ''}
      ${timelineHtml ? `<div class="detail-section"><h4>订单轨迹</h4><div class="timeline">${timelineHtml}</div></div>` : ''}
    </div>
  `;
  document.getElementById('productModal').classList.add('active');
}

document.getElementById('orderTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.order-tab');
  if (!tab) return;
  document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentOrderStatus = tab.dataset.status;
  loadOrders();
});

// 排序
document.getElementById('sortBar')?.addEventListener('click', (e) => {
  const item = e.target.closest('.sort-item');
  if (!item) return;
  document.querySelectorAll('.sort-item').forEach(i => i.classList.remove('active'));
  item.classList.add('active');
  currentSort = item.dataset.sort;
  loadCategoryProducts();
});

async function cancelOrder(id) { if (!confirm('确定取消？')) return; const r = await api(`/orders/${id}/cancel`,{method:'POST'}); showToast(r.msg); if(r.code===0){loadOrders();loadProfile();} }
async function refundOrder(id) { const reason = prompt('退款原因：'); if(reason===null) return; const r = await api(`/orders/${id}/refund`,{method:'POST',body:JSON.stringify({reason})}); showToast(r.msg); if(r.code===0) loadOrders(); }
async function reviewOrder(id) { const s = prompt('评分(1-5)：'); if(!s) return; const c = prompt('评价内容：'); const r = await api(`/orders/${id}/review`,{method:'POST',body:JSON.stringify({score:Number(s),content:c})}); showToast(r.msg); if(r.code===0) loadOrders(); }

// ── 个人中心 ─────────────────────────────────────
async function loadProfile() {
  const res = await api('/user/profile');
  if (res.code !== 0) return;
  currentUser = res.data;
  document.getElementById('profileName').textContent = currentUser.nickname;
  document.getElementById('profilePhone').textContent = currentUser.phone?.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
  document.getElementById('balanceValue').textContent = formatPrice(currentUser.balance);
  document.getElementById('totalSpent').textContent = formatPrice(currentUser.total_spent);
  document.getElementById('homeUserInfo').textContent = `余额 ${formatPrice(currentUser.balance)}`;
  const oRes = await api('/user/orders?limit=1');
  if (oRes.code === 0) document.getElementById('orderCount').textContent = oRes.pagination?.total || oRes.data.length;
}

// ── 充值 ─────────────────────────────────────────
function showRechargeModal() {
  const opts = [{a:30,b:0},{a:50,b:2},{a:100,b:5},{a:200,b:15},{a:500,b:50},{a:1000,b:120}];
  document.getElementById('rechargeOptions').innerHTML = opts.map(o => `
    <div class="recharge-item" onclick="selectRecharge(${o.a},this)">
      <div class="amount">¥${o.a}</div>
      ${o.b > 0 ? `<div class="bonus">送 ¥${o.b}</div>` : '<div class="bonus" style="color:var(--text-muted);">—</div>'}
    </div>
  `).join('');
  document.getElementById('rechargeModal').classList.add('active');
}
function selectRecharge(amount, el) {
  document.getElementById('rechargeAmount').value = amount;
  document.querySelectorAll('.recharge-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
}
async function doRecharge() {
  const amount = Number(document.getElementById('rechargeAmount').value);
  if (!amount || amount <= 0) return showToast('请输入金额');
  const res = await api('/user/recharge', { method: 'POST', body: JSON.stringify({ amount }) });
  if (res.code === 0) { showToast(res.msg); closeModal('rechargeModal'); loadProfile(); }
  else showToast(res.msg);
}

// ── 申请接单员 ───────────────────────────────────
function showApplyPlayerModal() { document.getElementById('applyPlayerModal').classList.add('active'); }
async function doApplyPlayer() {
  const real_name = document.getElementById('applyName').value;
  const game_names = document.getElementById('applyGames').value;
  const game_rank = document.getElementById('applyRank').value;
  const skill_desc = document.getElementById('applySkill').value;
  if (!real_name) return showToast('请输入姓名');
  const res = await api('/player/apply', { method: 'POST', body: JSON.stringify({ real_name, game_names, game_rank, skill_desc }) });
  showToast(res.msg);
  if (res.code === 0) closeModal('applyPlayerModal');
}

// ── 初始化 ───────────────────────────────────────
(async () => {
  if (token) {
    try {
      const res = await api('/user/profile');
      if (res.code === 0) { currentUser = res.data; enterApp(); }
      else { token = null; localStorage.removeItem('delta_token'); }
    } catch (e) { token = null; }
  }
})();
</script>
