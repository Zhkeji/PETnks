version: '3.8'

services:
  app:
    build: .
    container_name: delta-escort
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/backups
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-delta-escort-secret-key-2026}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/alive"]
      interval: 30s
      timeout: 5s
      retries: 3

